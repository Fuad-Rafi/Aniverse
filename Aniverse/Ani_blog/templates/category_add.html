{% extends 'base.html' %}
{% block title %}Create a new blog category!{% endblock %}

{% block content %}
{% if user.is_authenticated %}
    <section class="page-shell">
        <header class="page-header">
            <h1 class="page-title">Add Category</h1>
            <p class="page-subtitle">Create a new topic category for posts.</p>
        </header>

        <div class="panel-card">
            <form method="POST" class="app-form">
                {% csrf_token %}
                {{ form.as_p}}
                <div class="app-actions">
                    <button class='btn btn-primary'>Add Category</button>
                    <a href="{% url 'category-list' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </section>
{% else %}
    <section class="page-shell"><p class="forbidden-note">You're not allowed here!</p></section>
{% endif %}
{% endblock %}
