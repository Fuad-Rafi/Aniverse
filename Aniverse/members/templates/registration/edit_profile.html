{% extends 'base.html' %}
{% block title %}Edit Profile{% endblock %}

{% block content %}
<section class="page-shell">
    <header class="page-header">
        <h1 class="page-title">Edit Settings</h1>
        <p class="page-subtitle">Update your account settings.</p>
    </header>

    <div class="panel-card">
        <form method='POST' class="app-form" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="app-actions">
                <button class="btn btn-primary">Save Changes</button>
                <a href="{% url 'Home' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
